<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <!--
      Favicon URLs carry a ?v= cache buster. Vercel's CDN, browsers,
      and iOS Add-to-Home-Screen all cache these aggressively by
      URL — the legacy electric-blue mark was sticking around even
      after the file was replaced. Bumping the version forces a
      fresh fetch on next deploy. Bump again whenever the icon art
      changes.

      mask-icon is a monochrome glyph pinned by Safari for the
      pinned-tab strip; we tint it ink (the same near-black the
      brand mark uses) instead of the old accent green, since the
      mark itself is now black.
    -->
    <link rel="icon" type="image/png" href="/lounge-fav.png?v=4" />
    <link rel="shortcut icon" type="image/png" href="/lounge-fav.png?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="/lounge-fav.png?v=4" />
    <link rel="mask-icon" href="/lounge-fav.png?v=4" color="#0E1414" />
    <link rel="manifest" href="/manifest.webmanifest?v=4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F6F2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lounge" />
    <meta name="application-name" content="Lounge" />
    <meta name="description" content="Walk-ins and appointments by Venneir." />
    <!--
      Open Graph / Twitter card. Without these, Vercel's deployment
      previews and link-share unfurls fall back to a generic Vercel
      thumbnail. Pointing them at lounge-fav.png means the L mark is
      what appears on the Vercel dashboard tile, in iMessage / Slack
      previews, and on the deployment screenshots panel.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lounge" />
    <meta property="og:description" content="Walk-ins and appointments by Venneir." />
    <meta property="og:image" content="/lounge-fav.png?v=4" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Lounge" />
    <meta name="twitter:description" content="Walk-ins and appointments by Venneir." />
    <meta name="twitter:image" content="/lounge-fav.png?v=4" />
    <title>Lounge</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
